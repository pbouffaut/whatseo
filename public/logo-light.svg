<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" role="img" aria-label="WhatSEO.ai">
  <title>WhatSEO.ai</title>
  <defs>
    <linearGradient id="gold-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a030"/>
      <stop offset="100%" stop-color="#a07818"/>
    </linearGradient>
    <linearGradient id="iconBg-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark ── -->
  <rect width="80" height="80" rx="18" fill="url(#iconBg-l)"/>

  <!-- W-shaped bar chart -->
  <rect x="13" y="20" width="9" height="52" rx="3" fill="url(#gold-l)"/>
  <rect x="25" y="45" width="9" height="27" rx="3" fill="#b88c24" opacity="0.5"/>
  <rect x="37" y="35" width="9" height="37" rx="3" fill="#b88c24" opacity="0.72"/>
  <rect x="49" y="45" width="9" height="27" rx="3" fill="#b88c24" opacity="0.5"/>
  <rect x="61" y="20" width="9" height="52" rx="3" fill="url(#gold-l)"/>
  <rect x="61" y="20" width="9" height="6" rx="3" fill="#d4aa5a" opacity="0.6"/>

  <!-- Sparkle -->
  <g transform="translate(68,11)">
    <path d="M0-4.5 1.1-1.1 4.5 0 1.1 1.1 0 4.5-1.1 1.1-4.5 0-1.1-1.1Z"
      fill="#b88c24" opacity="0.9"/>
  </g>

  <!-- ── Wordmark — dark text for light backgrounds ── -->
  <text x="96" y="52"
    font-family="Georgia, Palatino, 'Times New Roman', serif"
    font-size="33" font-weight="700"
    fill="#1a1a1a" letter-spacing="-0.5">What</text>

  <text x="191" y="52"
    font-family="Georgia, Palatino, 'Times New Roman', serif"
    font-size="33" font-weight="700"
    fill="url(#gold-l)" letter-spacing="-0.5">SEO</text>

  <text x="257" y="52"
    font-family="Georgia, Palatino, 'Times New Roman', serif"
    font-size="22"
    fill="#6b5f4f">.ai</text>
</svg>
