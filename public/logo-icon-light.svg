  <rect x="25" y="45" width="9" height="27" rx="3" fill="#c9a85c" opacity="0.65"/>
  <rect x="37" y="35" width="9" height="37" rx="3" fill="#c9a85c" opacity="0.85"/>
  <rect x="49" y="45" width="9" height="27" rx="3" fill="#c9a85c" opacity="0.65"/>
  <rect x="61" y="20" width="9" height="52" rx="3" fill="url(#gold-l)"/>
  <!-- Glow cap -->
  <rect x="61" y="20" width="9" height="6" rx="3" fill="#f5e0a0" opacity="0.8"/>

  <!-- AI sparkle -->
  <g transform="translate(68,11)">
    <path d="M0-4.5 1.1-1.1 4.5 0 1.1 1.1 0 4.5-1.1 1.1-4.5 0-1.1-1.1Z"
