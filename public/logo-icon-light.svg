<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="WhatSEO.ai icon">
  <title>WhatSEO</title>
  <defs>
    <linearGradient id="gold-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c87a"/>
      <stop offset="100%" stop-color="#c9a85c"/>
